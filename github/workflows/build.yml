name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Restore keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > foxsd.keystore

      - name: Sign and align APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore foxsd.keystore -storepass "$KEYSTORE_PASSWORD" app/build/outputs/apk/release/app-release-unsigned.apk "$KEY_ALIAS"
          zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-aligned.apk

      - name: Upload APK artifact
  uses: actions/upload-artifact@v4
  with:
    name: foxsd-apk
    path: |
      app/build/outputs/apk/release/*.apk
      app-release-aligned.apk
